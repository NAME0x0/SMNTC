name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck · Build · Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Contract drift checks
        run: npm run test:contracts

      - name: Build
        run: npm run build

      - name: Verify dist outputs
        run: |
          test -f dist/index.mjs
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/react/index.mjs
          test -f dist/react/index.js
          test -f dist/web/index.mjs
          test -f dist/cli.js
          echo "All expected dist outputs present."

      - name: Bundle size budget
        run: npm run size

      - name: Performance budget gate
        if: matrix.node-version == 22
        run: npm run perf:budget:report

      - name: Upload performance report artifact
        if: matrix.node-version == 22 && always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-trend-ci-node${{ matrix.node-version }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/perf/benchmark-results.json
          if-no-files-found: error

      - name: Test
        run: npm test

      - name: Browser smoke tests
        if: matrix.node-version == 22
        run: npm run test:browser
