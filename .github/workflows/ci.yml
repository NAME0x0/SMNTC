name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: Typecheck · Build · Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Contract drift checks
        run: npm run test:contracts

      - name: Build
        run: npm run build

      - name: Verify dist outputs
        run: |
          test -f dist/index.mjs
          test -f dist/index.js
          test -f dist/index.d.ts
          test -f dist/react/index.mjs
          test -f dist/react/index.js
          test -f dist/web/index.mjs
          test -f dist/cli.js
          echo "All expected dist outputs present."

      - name: Bundle size budget
        run: npm run size

      - name: Performance budget gate
        if: matrix.node-version == 22
        run: npm run perf:budget:report

      - name: Generate performance markdown summary
        if: matrix.node-version == 22
        run: npm run perf:summary

      - name: Append performance summary to check output
        if: matrix.node-version == 22
        run: cat artifacts/perf/benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment performance summary on PR
        if: matrix.node-version == 22 && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- smntc-perf-summary -->';
            const summaryPath = 'artifacts/perf/benchmark-summary.md';
            if (!fs.existsSync(summaryPath)) {
              core.warning(`Performance summary not found at ${summaryPath}.`);
              return;
            }

            const summary = fs.readFileSync(summaryPath, 'utf8');
            const body = `${marker}\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });

      - name: Upload performance report artifact
        if: matrix.node-version == 22 && always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-trend-ci-node${{ matrix.node-version }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/perf/benchmark-results.json
          if-no-files-found: error

      - name: Upload performance summary artifact
        if: matrix.node-version == 22 && always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-summary-ci-node${{ matrix.node-version }}-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/perf/benchmark-summary.md
          if-no-files-found: error

      - name: Test
        run: npm test

      - name: Browser smoke tests
        if: matrix.node-version == 22
        run: npm run test:browser
