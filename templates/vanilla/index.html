<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMNTC Vanilla Starter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root { color-scheme: dark; --bg: #0b0d12; --ink: #f5f7ff; --muted: rgba(245,247,255,0.6); --accent: #6ee7ff; }
      body { font-family: "Space Grotesk", system-ui, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; overflow: hidden; }
      #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
      #app { position: relative; z-index: 2; max-width: 720px; padding: 72px 8vw; }
      .tag { display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 999px; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; background: rgba(110,231,255,0.15); color: var(--accent); margin-bottom: 20px; }
      h1 { font-size: clamp(2.2rem, 5vw, 4rem); line-height: 1.05; margin-bottom: 16px; }
      p { color: var(--muted); font-size: 1.05rem; max-width: 520px; margin-bottom: 32px; }
      .actions { display: flex; gap: 12px; flex-wrap: wrap; }
      button { border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: var(--ink); padding: 10px 18px; border-radius: 999px; font-size: 0.9rem; cursor: pointer; transition: 0.2s ease; }
      button:hover { border-color: rgba(110,231,255,0.6); color: var(--accent); }
      button.active { border-color: rgba(110,231,255,0.8); background: rgba(110,231,255,0.2); color: var(--accent); }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="app">
      <div class="tag">SMNTC</div>
      <h1>Semantic motion for the web.</h1>
      <p>Swap tokens, not shaders. Built for Three.js, ready for production.</p>
      <div class="actions">
        <button data-vibe="calm" class="active">Calm</button>
        <button data-vibe="agitated">Agitated</button>
        <button data-vibe="chaotic">Chaotic</button>
      </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
      }
    }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { SMNTCKernel } from 'https://cdn.jsdelivr.net/npm/smntc@1.2.0/dist/index.mjs';

      const canvas = document.getElementById('scene');
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0, 4);

      const geometry = new THREE.PlaneGeometry(4, 4, 128, 128);
      const mesh = new THREE.Mesh(geometry);
      mesh.rotation.x = -Math.PI / 2;
      scene.add(mesh);

      const kernel = new SMNTCKernel({
        surface: 'fluid',
        vibe: 'calm',
        palette: 'arctic',
        reactivity: 'magnetic',
        wireframe: true,
      });

      kernel.apply(mesh, camera, renderer.domElement);
      kernel.start(renderer, scene, camera);

      function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height, false);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      window.addEventListener('resize', resize);
      resize();

      const buttons = document.querySelectorAll('button[data-vibe]');
      buttons.forEach((button) => {
        button.addEventListener('click', () => {
          buttons.forEach((b) => b.classList.remove('active'));
          button.classList.add('active');
          kernel.setVibe(button.dataset.vibe);
        });
      });
    </script>
  </body>
</html>
